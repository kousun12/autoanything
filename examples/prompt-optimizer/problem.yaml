name: support-routing-prompt
description: >-
  Optimize the system prompt for routing customer support tickets into the right
  queue. Higher accuracy on the private evaluation set is better.
mutable:
  - state/system_prompt.txt
readonly:
  - context/examples.jsonl
  - agent_instructions.md
  - leaderboard.md
score:
  direction: maximize
  name: accuracy
  description: Held-out routing accuracy
  bounded: true
  bound: 100.0
constraints:
  - Only edit the system prompt template under state/
