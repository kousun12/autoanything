name: rectangle-packing
description: >
  Pack 12 rectangles into the smallest possible bounding box with no overlaps.
  Rectangle sizes are fixed in context/problem.py. You control the (x, y)
  position and rotation of each rectangle in state/packing.py.

score:
  direction: minimize
  description: "Bounding box area + overlap penalty (10000 per overlapping pair) — lower is better"
  bounded: true

constraints:
  - "Placements must have exactly 12 entries matching the 12 rectangles"
  - "Coordinates must be non-negative integers"
