name: rastrigin
description: >
  Minimize the Rastrigin function in 10 dimensions. This is a classic
  multimodal optimization benchmark with many local minima. The global
  minimum is 0.0 at the origin (all zeros). Modify the solution vector
  in state/solution.py.

score:
  direction: minimize
  description: "Rastrigin function value — global minimum is 0.0 at the origin"
  bounded: true

constraints:
  - "Solution vector must have exactly 10 elements"
