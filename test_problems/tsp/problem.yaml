name: tsp-20
description: >
  Find the shortest tour visiting all 20 cities exactly once and returning
  to the start. The cities have fixed coordinates defined in context/cities.py.
  Modify the tour permutation in state/tour.py.

mutable:
  - state/tour.py

readonly:
  - context/cities.py

score:
  direction: minimize
  name: score
  description: "Total Euclidean tour distance — lower is better"
  bounded: true

constraints:
  - "Must not modify files outside of state/"
  - "Tour must be a valid permutation of [0..19] (each city visited exactly once)"
  - "No external dependencies required"
