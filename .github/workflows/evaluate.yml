name: Evaluate proposals

on:
  pull_request:
    branches: [master]

permissions:
  contents: write
  pull-requests: write

jobs:
  evaluate:
    runs-on: ubuntu-latest
    env:
      EVALUATOR_REPOSITORY: ${{ vars.AUTOANYTHING_EVALUATOR_REPOSITORY }}
      EVALUATOR_TOKEN: ${{ secrets.AUTOANYTHING_EVALUATOR_TOKEN }}
    concurrency:
      group: evaluation
      cancel-in-progress: false
    steps:
      - name: Detect private evaluator configuration
        id: config
        run: |
          if [ -n "$EVALUATOR_REPOSITORY" ] && [ -n "$EVALUATOR_TOKEN" ]; then
            echo "enabled=true" >> "$GITHUB_OUTPUT"
          else
            echo "enabled=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Check out proposal
        uses: actions/checkout@v5
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          fetch-depth: 0

      - name: Check out private evaluator
        if: steps.config.outputs.enabled == 'true'
        uses: actions/checkout@v5
        with:
          repository: ${{ env.EVALUATOR_REPOSITORY }}
          token: ${{ env.EVALUATOR_TOKEN }}
          path: _evaluator

      - name: Run private evaluation
        if: steps.config.outputs.enabled == 'true'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          BASE_REF: ${{ github.event.pull_request.base.ref }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: bash _evaluator/evaluate_pr.sh

      - name: Skip because evaluator secrets are not configured
        if: steps.config.outputs.enabled != 'true'
        run: |
          echo "::notice title=AutoAnything evaluator skipped::Set AUTOANYTHING_EVALUATOR_REPOSITORY and AUTOANYTHING_EVALUATOR_TOKEN to enable private PR evaluation."
