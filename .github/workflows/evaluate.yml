name: evaluate-proposal

on:
  pull_request:
    branches: [master]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

permissions:
  contents: write
  pull-requests: write

jobs:
  evaluate:
    runs-on: ubuntu-latest
    concurrency:
      group: autoanything-evaluation
      cancel-in-progress: false
    steps:
      - name: Check out proposal
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.event.pull_request.head.sha || github.sha }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install public dependencies
        run: python -m pip install -e .

      - name: Fetch private evaluator
        uses: actions/checkout@v4
        with:
          repository: ${{ vars.AUTOANYTHING_EVALUATOR_REPO }}
          token: ${{ secrets.EVALUATOR_TOKEN }}
          path: _evaluator

      - name: Run private evaluation
        env:
          AUTOANYTHING_BASE_BRANCH: master
          AUTOANYTHING_PR_NUMBER: ${{ github.event.pull_request.number || '' }}
        run: bash _evaluator/score.sh

      - name: Report result and merge or close
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: python _evaluator/reporter.py
