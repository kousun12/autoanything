# problem.yaml — Define your optimization problem.
#
# Activate a built-in problem:
#   bash examples/activate.sh <problem>
#
# Or scaffold a new one:
#   autoanything init <name>
#
# Or define your own by filling in this template:

name: my-problem
description: >
  Describe what you're optimizing and how agents should approach it.

mutable:
  - state/solution.py    # File(s) agents can modify — name files however you like

readonly:
  - context/problem.py   # Read-only context files

score:
  direction: minimize    # or: maximize
  name: score            # metric name (key in dict returned by score.py)
  description: "What this metric measures"
  bounded: true          # true if there's a known optimum

constraints:
  - "Must not modify files outside of state/"
